services:
  postgres:
    image: postgres:16-alpine
    container_name: zadia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zadia
      POSTGRES_PASSWORD: zadia
      POSTGRES_DB: zadiahost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zadia -d zadiahost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zadia-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # "postgres" est le nom du service Docker, résolu dans le réseau interne
      DATABASE_URL: postgres://zadia:zadia@postgres:5432/zadiahost?sslmode=disable
      PORT: 8083
      PROXY_PORT: "80"
    ports:
      - "8083:8083"
      - "80:80"
      - "8085:8085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Le socket LXD est monté en volume — network_mode: host n'est pas nécessaire
      - /var/snap/lxd/common/lxd/unix.socket:/var/snap/lxd/common/lxd/unix.socket

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8083
    container_name: zadia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8083
    ports:
      - "8880:3000"

volumes:
  postgres_data:
    driver: local
